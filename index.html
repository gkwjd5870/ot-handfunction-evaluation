<script>
  // 파일 수정 시각 기반 캐시 무효화 (로컬 데이터는 건드리지 않음)
  fetch(location.href, {method:'HEAD', cache:'no-cache'})
    .then(res => {
      const lastMod = res.headers.get('last-modified') || res.headers.get('etag') || '';
      const saved = localStorage.getItem('ot_hand_file_version');
      if(saved && saved !== lastMod && lastMod){
        localStorage.setItem('ot_hand_file_version', lastMod);
        if('caches' in window) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        if('serviceWorker' in navigator)
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        window.location.reload();
      } else {
        if(lastMod) localStorage.setItem('ot_hand_file_version', lastMod);
      }
    }).catch(()=>{});

  if('serviceWorker' in navigator){
    const swCode = `
const CACHE = 'ot-hand-eval-v1';
const ASSETS = [location.pathname || '/'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
});
self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
self.addEventListener('fetch', e => {
  if(e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const net = fetch(e.request).then(res => {
        if(res && res.status === 200){
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => cached);
      return cached || net;
    })
  );
});
`;
    const blob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
</script>

  { key:"right", label:"Right Hand (30초)" },
  { key:"left", label:"Left Hand (30초)" },

const MFT_RAW_ITEMS = [
  { key:"shoulderFlex", label:"어깨 굽힘 (Shoulder Flexion)",
    opts:[[1,"45도 미만"],[2,"45-90도"],[3,"90-135도"],[4,"135도 이상"]] },

  { key:"pinchGrasp", label:"Pinch grasp",

    opts:[[1,"5초 이내에 1-2개"],[2,"5초 이내에 3-4개"],[3,"5초 이내에 5-6개"],[4,"5초 이내에 7-8개"]] },
  { key:"pegboardMft", label:"Peg board",
    opts:[[1,"30초 이내에 1-3개"],[2,"30초 이내에 4-6개"],[3,"30초 이내에 7-9개"],[4,"30초 이내에 10-12개"],[5,"30초 이내에 13-15개"],[6,"30초 이내에 16개 이상"]] },
];

const TOUCH_FILAMENTS = [2.83, 3.61, 4.31, 4.56, 6.65];
const TWO_POINT_OPTS = Array.from({length:15}, (_,i)=>i+1); // 1~15mm

const STORAGE_KEY = "ot_hand_mft_eval_v1";

/* ---------------- 저장 / 로드 ---------------- */

function loadDB(){
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if(r){
      const d = JSON.parse(r);
      if(d.custom){
        return { custom: d.custom||[], presets: d.presets||[] };
      }
      // 이전 버전(탭 고정형) 데이터 마이그레이션 — 기록이 사라지지 않도록 모듈 목록을 붙여서 이관
      const OLD_HF_MODULES = ["jebsen","handpower","mftraw","oconnor","boxblock","edinburgh","fingertap","thumbloc"];
      const OLD_MFT_MODULES = ["edinburgh","mftraw","fingertap","boxblock","thumbloc","oconnor","handpower","dash","sensibility","purdue"];
      const custom = [];
      (d.hf||[]).forEach(rec=> custom.push({...rec, modules: OLD_HF_MODULES}));
      (d.mft||[]).forEach(rec=> custom.push({...rec, modules: OLD_MFT_MODULES}));
      return { custom, presets: [] };
    }
  } catch(e){}
  return { custom:[], presets:[] };
}
function saveDB(db){
  try {
    const payload = JSON.stringify(db);
    localStorage.setItem(STORAGE_KEY, payload);
    localStorage.setItem(STORAGE_KEY+"_backup", payload);
    localStorage.setItem(STORAGE_KEY+"_backup_time", new Date().toISOString());

/* 저장된 예전 데이터에 새 필드가 없어도 안전하게 기본값과 병합 */
function deepMerge(def, data){
  if(Array.isArray(def)){
    if(!Array.isArray(data)) return def;
    return def.map((defItem,i)=> data[i]!==undefined ? deepMerge(defItem, data[i]) : defItem);
  }
  if(def && typeof def === "object"){
    if(!data || typeof data !== "object") return def;
    const out = {};
    Object.keys(def).forEach(k=>{ out[k] = deepMerge(def[k], data[k]); });
    return out;
  }
  return (data===undefined || data===null) ? def : data;
}

/* ---------------- 공통 계산 ---------------- */

function edinCalc(edin){
  const filled = edin.filter(v=>v!==null && v!==undefined);
  if(filled.length===0) return { sum:null, lq:null, cat:"" };
  const sum = filled.reduce((a,b)=>a+b,0);
  const lq = sum/4;
  let cat = "";
  if(lq<=-61) cat="왼손 우세";
  else if(lq>=61) cat="오른손 우세";
  else cat="양손 우세";
  return { sum, lq, cat };
}
function tapAvg(rows, side){
  const vals = rows.map(r=>num(r[side])).filter(v=>v!==null);
  if(vals.length===0) return "";
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}
/* O'Connor: Minute+Second를 합산해 초로 환산 후 raw score 계산 */
function oconnorTotalSec(min, sec){
  const m = num(min), s = num(sec);
  if(m===null && s===null) return null;
  return (m||0)*60 + (s||0);
}
function oconnorRaw(side){
  const first = oconnorTotalSec(side.firstMin, side.firstSec);
  const second = oconnorTotalSec(side.secondMin, side.secondSec);
  if(first===null && second===null) return null;
  return ((first||0) + 1.1*(second||0)) / 2;
}
/* O'Connor Finger Dexterity Test 규준표 (Raw score가 낮을수록=빠를수록 %tile 높음)
   출처: 병원 제공 규준표. 엑셀 원본과 동일하게 raw score가 표의 기준값 이하가 되는 첫 구간의 %tile을 사용합니다(계단식 매칭, 보간 없음). */
const OCONNOR_NORMS = {
  male: [
    {raw:183, pct:99.86}, {raw:194, pct:99.4}, {raw:207, pct:97.7}, {raw:221, pct:93.3},
    {raw:238, pct:84.1}, {raw:257, pct:69.1}, {raw:280, pct:50}, {raw:307, pct:30.9},
    {raw:340, pct:15.9}, {raw:382, pct:6.7}, {raw:434, pct:2.3}, {raw:503, pct:0.6}, {raw:598, pct:0.14},
  ],
  female: [
    {raw:166, pct:99.86}, {raw:175, pct:99.4}, {raw:186, pct:97.7}, {raw:197, pct:93.3},
    {raw:211, pct:84.1}, {raw:226, pct:69.1}, {raw:244, pct:50}, {raw:265, pct:30.9},
    {raw:290, pct:15.9}, {raw:319, pct:6.7}, {raw:356, pct:2.3}, {raw:402, pct:0.6}, {raw:462, pct:0.14},
  ],
};
function oconnorPercentile(raw, gender){
  if(raw===null || !gender) return null;
  const table = OCONNOR_NORMS[gender]; // raw 오름차순
  if(!table || table.length===0) return null;
  for(const row of table){
    if(raw <= row.raw) return row.pct;
  }
  return table[table.length-1].pct; // 표의 최대 raw score를 초과하면 가장 낮은 %tile
}
function fmtPct(pct){
  if(pct===null || pct===undefined) return "-";
  return (Math.round(pct*100)/100).toString();
}

/* 여러 타이머 컴포넌트가 공유하는 알림음 */
let _sharedAudioCtx = null;
function playBeep(){
  try{
    if(!_sharedAudioCtx) _sharedAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx = _sharedAudioCtx;
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = 0.15;
    o.start(); o.stop(ctx.currentTime+0.35);
    if(navigator.vibrate) navigator.vibrate(200);
  }catch(e){}
}

    } else {
      clearInterval(intervalRef.current);

    return ()=>clearInterval(intervalRef.current);
  }, [running]);

  const toggle = (e)=>{

      setRunning(false);

      setElapsed(0);
    } else {

    }
  };

  return (
    <button type="button" className={"cell-timer"+(running?" running":"")} onClick={toggle}>
      {running ? (elapsed/1000).toFixed(1)+"초 ■" : "⏱ 측정"}

/* 환자가 직접 화면을 탭해서 태핑 횟수를 재는 도구. 저장 위치는 부모(FingerTapBlock)가 미리 정해두고,
   측정이 끝나면(시간 종료 또는 수동 정지) onFinish(count)를 한 번 호출한다. */
function TapTestTool({ onFinish, seconds=10 }){
  const [count, setCount] = useState(0);
  const [running, setRunning] = useState(false);
  const [remainMs, setRemainMs] = useState(seconds*1000);
  const countRef = useRef(0);
  const startRef = useRef(0);
  const intervalRef = useRef(null);
  const onFinishRef = useRef(onFinish);
  onFinishRef.current = onFinish;

  useEffect(()=>{
    if(running){
      startRef.current = Date.now();
      intervalRef.current = setInterval(()=>{
        const left = seconds*1000 - (Date.now()-startRef.current);
        if(left<=0){
          setRemainMs(0);
          setRunning(false);
          playBeep();
          clearInterval(intervalRef.current);
          onFinishRef.current(countRef.current);
        } else {
          setRemainMs(left);
        }
      }, 100);
    } else {
      clearInterval(intervalRef.current);
    }
    return ()=>clearInterval(intervalRef.current);
  }, [running]);

  const start = ()=>{
    countRef.current = 0;
    setCount(0);
    setRemainMs(seconds*1000);
    setRunning(true);
  };
  const stop = ()=>{
    setRunning(false);
    onFinishRef.current(countRef.current);
  };
  const reset = ()=>{
    setRunning(false);
    countRef.current = 0;
    setCount(0);
    setRemainMs(seconds*1000);
  };
  const tap = (e)=>{
    e.preventDefault();
    if(!running) return;
    countRef.current += 1;
    setCount(countRef.current);
  };

  return (
    <div style={{marginBottom:16}}>
      <div
        className={"tap-box"+(running?" active":"")}
        onClick={tap}
      >
        <div className="tap-count">{count}</div>
        <div className="tap-hint">
          {running ? `남은 시간 ${(remainMs/1000).toFixed(1)}초 — 계속 탭하세요!` : `시작 버튼을 누른 뒤 이 박스를 ${seconds}초 동안 탭하세요`}
        </div>
      </div>
      <div style={{display:"flex", gap:8, marginTop:10}}>
        {!running
          ? <button type="button" className="inline-timer-btn" onClick={start}>▶ {seconds}초 시작</button>
          : <button type="button" className="inline-timer-btn running" onClick={stop}>■ 정지 (기록)</button>}
        <button type="button" className="mini-btn" onClick={reset}>초기화</button>
      </div>
    </div>
  );
}

        </div>
      </Field>
      <TapTestTool seconds={10} onFinish={handleFinish} />

      <table className="datatable">
        <thead><tr><th></th><th>Rt.</th><th>Lt.</th></tr></thead>
        <tbody>
          {[0,1,2].map(i=>(
            <tr key={i}>

/* 누르면 자동으로 60초를 카운트다운하는 타이머 (Box & Block Test용) */
/* 누르면 자동으로 지정한 초를 카운트다운하는 타이머 (Purdue Pegboard, Box & Block 등에서 재사용) */
function CountdownTimer({ seconds, label }){
  const totalMs = seconds*1000;
  const [running, setRunning] = useState(false);
  const [remain, setRemain] = useState(totalMs);
  const startRef = useRef(0);
  const intervalRef = useRef(null);

  useEffect(()=>{
    if(running){
      startRef.current = Date.now();
      intervalRef.current = setInterval(()=>{
        const left = totalMs - (Date.now() - startRef.current);
        if(left<=0){
          setRemain(0);
          setRunning(false);
          playBeep();
          clearInterval(intervalRef.current);
        } else {
          setRemain(left);
        }
      }, 100);
    } else {
      clearInterval(intervalRef.current);
    }
    return ()=>clearInterval(intervalRef.current);
  }, [running]);

  const toggle = ()=>{
    if(running){
      setRunning(false);
    } else {
      setRemain(totalMs);
      setRunning(true);
    }
  };

  const fmt = (ms)=>{
    const s = Math.max(0, Math.ceil(ms/1000));
    const mm = Math.floor(s/60), ss = s%60;
    return (mm<10?"0"+mm:mm)+":"+(ss<10?"0"+ss:ss);
  };

  return (
    <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:10}}>
      <button type="button" className={"inline-timer-btn"+(running?" running":"")} onClick={toggle}>
        {running ? "■ 정지" : (label || `▶ ${seconds}초 타이머 시작`)}
      </button>
      <div className="inline-timer-display">{fmt(remain)}</div>
    </div>
  );
}

function OconnorBlock({ data, onChange, title }){
  const setField = (side, key, val)=> onChange({...data, [side]:{...data[side], [key]:val}});
  const genderKey = data.gender ? data.gender.toLowerCase() : "";
  const rawRt = oconnorRaw(data.rt);
  const rawLt = oconnorRaw(data.lt);
  const pctRt = rawRt===null ? null : oconnorPercentile(rawRt, genderKey);
  const pctLt = rawLt===null ? null : oconnorPercentile(rawLt, genderKey);

  return (
    <Section title={title || "O'Connor Finger Dexterity Test"} sub="Raw score = {First half + (1.1 × Second half)} ÷ 2 (초 환산)">
      <Field label="성별" hint="규준표(Male/Female)가 다르게 적용됩니다">
        <SegPick options={["Male","Female"]} value={data.gender} onChange={v=>onChange({...data, gender:v})} />
      </Field>
      <table className="datatable">
        <thead>
          <tr><th></th><th>Min</th><th>Sec</th></tr>
        </thead>
        <tbody>
          <tr>
            <td colSpan="3" style={{background:"#f8fafc", fontWeight:800, textAlign:"left", color:"#7c3aed", fontSize:12}}>First half</td>
          </tr>
          <tr>
            <td className="rowlabel">Rt.</td>
            <td><NumInput value={data.rt.firstMin} onChange={v=>setField("rt","firstMin",v)} decimal={false} /></td>
            <td><NumInput value={data.rt.firstSec} onChange={v=>setField("rt","firstSec",v)} /></td>
          </tr>
          <tr>
            <td className="rowlabel">Lt.</td>
            <td><NumInput value={data.lt.firstMin} onChange={v=>setField("lt","firstMin",v)} decimal={false} /></td>
            <td><NumInput value={data.lt.firstSec} onChange={v=>setField("lt","firstSec",v)} /></td>
          </tr>
          <tr>
            <td colSpan="3" style={{background:"#f8fafc", fontWeight:800, textAlign:"left", color:"#7c3aed", fontSize:12}}>Second half</td>
          </tr>
          <tr>
            <td className="rowlabel">Rt.</td>
            <td><NumInput value={data.rt.secondMin} onChange={v=>setField("rt","secondMin",v)} decimal={false} /></td>
            <td><NumInput value={data.rt.secondSec} onChange={v=>setField("rt","secondSec",v)} /></td>
          </tr>
          <tr>
            <td className="rowlabel">Lt.</td>
            <td><NumInput value={data.lt.secondMin} onChange={v=>setField("lt","secondMin",v)} decimal={false} /></td>
            <td><NumInput value={data.lt.secondSec} onChange={v=>setField("lt","secondSec",v)} /></td>
          </tr>
        </tbody>
      </table>

      <div className="side-label" style={{marginTop:14}}>결과</div>
      <table className="datatable">
        <thead>
          <tr><th></th><th>Raw score</th><th>%tile rank</th></tr>
        </thead>
        <tbody>
          <tr>
            <td className="rowlabel">Rt.</td>
            <td style={{fontWeight:800,color:"#7c3aed"}}>{rawRt===null?"-":rawRt.toFixed(2)}</td>
            <td style={{fontWeight:700,color:"#7c3aed"}}>{fmtPct(pctRt)}</td>
          </tr>
          <tr>
            <td className="rowlabel">Lt.</td>
            <td style={{fontWeight:800,color:"#7c3aed"}}>{rawLt===null?"-":rawLt.toFixed(2)}</td>

          </tr>
        </tbody>
      </table>
      <div className="footer-note" style={{padding:"6px 2px 0"}}>Min/Sec = 분/초. Raw score는 First half·Second half를 초로 환산해 자동 계산되며, %tile rank는 병원 규준표(Men/Women, 13개 구간)에서 raw score 이하인 첫 구간 값을 그대로 사용합니다(엑셀 원본과 동일한 계단식 매칭).</div>

function PurdueBlock({ purdue, setPath, title }){
  const rlbSum = (t)=>{
    const vals = [purdue.right[t], purdue.left[t], purdue.both[t]];
    const hasAny = vals.some(v=>v!=="" && v!==null && v!==undefined);
    if(!hasAny) return "-";
    return vals.reduce((a,v)=> a + (num(v)||0), 0);
  };
  return (
    <Section title={title || "Purdue Pegboard Test"} sub="Right/Left/Both는 30초, Assembly는 1분 타이머로 시간을 재고 완료된 개수를 입력하세요">
      <CountdownTimer seconds={30} label="▶ 30초 타이머 시작 (Right / Left / Both)" />
      <table className="datatable">
        <thead><tr><th style={{textAlign:"left"}}>항목</th><th>1st</th><th>2nd</th><th>3rd</th></tr></thead>
        <tbody>
          {["right","left","both"].map(key=>{
            const row = PURDUE_ROWS.find(r=>r.key===key);
            return (
              <tr key={key}>
                <td className="rowlabel">{row.label}</td>
                {["t1","t2","t3"].map(t=>(
                  <td key={t}>
                    <NumInput value={purdue[key][t]} onChange={v=>setPath(["purdue",key,t],v)} decimal={false} />
                  </td>
                ))}
              </tr>
            );
          })}
          <tr>
            <td className="rowlabel">R + L + B</td>
            {["t1","t2","t3"].map(t=>(
              <td key={t} style={{fontWeight:800,color:"#7c3aed"}}>{rlbSum(t)}</td>
            ))}
          </tr>
        </tbody>
      </table>

      <div style={{marginTop:16}}>
        <CountdownTimer seconds={60} label="▶ 1분 타이머 시작 (Assembly)" />
        <table className="datatable">
          <thead><tr><th style={{textAlign:"left"}}>항목</th><th>1st</th><th>2nd</th><th>3rd</th></tr></thead>
          <tbody>
            <tr>
              <td className="rowlabel">Assembly (1분)</td>
              {["t1","t2","t3"].map(t=>(
                <td key={t}>
                  <NumInput value={purdue.assembly[t]} onChange={v=>setPath(["purdue","assembly",t],v)} decimal={false} />
                </td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
    </Section>
  );
}

/* ---------------- 맞춤 평가 폼 (선택된 항목만 표시) ---------------- */

function FormCustom({ initial, modules, onSave, onCancel, isEdit, onRequestDelete, onEditModules }){
  const [d, setD] = useState(initial);

  const setPath = (path, val)=>{
    setD(prev=>{
      const next = JSON.parse(JSON.stringify(prev));
      let cur = next;
      for(let i=0;i<path.length-1;i++) cur = cur[path[i]];
      cur[path[path.length-1]] = val;
      return next;
    });
  };
  const setRaw = (i, side, val)=>{
    const raw = d.raw.map((r,idx)=> idx===i ? {...r,[side]:val} : r);
    setD({...d, raw});
  };
  const helpers = { setD, setPath, setRaw };

  return (
    <React.Fragment>
      <div className="scroll-area">
        <div className="pad">

          <Section title="기본 정보" right={<button className="mini-btn" onClick={onEditModules}>항목 변경</button>}>
            <Field label="검사일">
              <input type="date" className="text-input" value={d.date} onChange={e=>setD({...d,date:e.target.value})} />
            </Field>
            <Field label="평가 종류" hint="예: 초기평가 / 재평가">
              <TextInput value={d.evalType} onChange={v=>setD({...d,evalType:v})} placeholder="초기평가 / 재평가 등" />
            </Field>
          </Section>

          {modules.length===0 && (
            <div className="empty-state">
              <div className="big">🗒️</div>
              <div style={{fontWeight:700, marginBottom:4}}>선택된 평가 항목이 없습니다</div>
              <div style={{fontSize:12.5}}>위 "항목 변경" 버튼으로 포함할 항목을 선택하세요</div>
            </div>
          )}

          {modules.map(key=>{
            const def = MODULE_DEFS.find(m=>m.key===key);
            if(!def) return null;
            return <React.Fragment key={key}>{def.render(d, helpers)}</React.Fragment>;
          })}

          <Section title="비고">
            <TextInput area value={d.note} onChange={v=>setD({...d,note:v})} placeholder="특이사항 (선택)" />
          </Section>

          <div className="footer-note">작성자(작업치료사) 서명란은 EMR 시스템에서 별도 처리하세요. 이 앱에는 환자 개인정보를 입력하지 않습니다.</div>
        </div>
      </div>
      <div className="action-bar">
        {isEdit && <button className="btn danger" onClick={onRequestDelete} style={{flex:"0 0 74px"}}>삭제</button>}
        <button className="btn cancel" onClick={onCancel}>취소</button>
        <button className="btn save" onClick={()=>onSave(d)}>저장</button>
      </div>
    </React.Fragment>
  );
}

/* ---------------- 이름 입력 모달 (세트 저장용) ---------------- */

function PromptModal({ title, placeholder, onCancel, onConfirm }){
  const [val, setVal] = useState("");
  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{title || "이름 입력"}</div>
        <input
          className="text-input" style={{marginBottom:16}} autoFocus
          value={val} placeholder={placeholder||""}
          onChange={e=>setVal(e.target.value)}
        />
        <div className="modal-actions">
          <button className="btn cancel" onClick={onCancel}>취소</button>
          <button className="btn save" onClick={()=>{ if(val.trim()) onConfirm(val.trim()); }}>저장</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- 평가 항목 선택 모달 ("평가 시작하기" / "항목 변경") ---------------- */

function ModulePickerModal({ initialModules, presets, onStart, onSavePreset, onDeletePreset, onClose }){
  const [selected, setSelected] = useState(initialModules || []);
  const [showNameModal, setShowNameModal] = useState(false);

  const toggle = (key)=> setSelected(s=> s.includes(key) ? s.filter(k=>k!==key) : [...s, key]);
  const toggleAll = ()=> setSelected(selected.length===MODULE_DEFS.length ? [] : MODULE_DEFS.map(m=>m.key));

  return (
    <div className="picker-overlay">
      <div className="topbar">
        <div className="brand">평가 항목 선택</div>
        <button className="icon-btn" onClick={onClose}>✕</button>
      </div>
      <div className="scroll-area">
        <div className="pad">
          {presets.length>0 && (
            <Section title="저장된 세트" sub="눌러서 바로 적용">
              <div className="chipwrap">
                {presets.map(p=>(
                  <div key={p.id} style={{display:"flex", alignItems:"center", gap:4}}>
                    <button type="button" className="chip" onClick={()=>setSelected(p.modules)}>
                      {p.name} ({p.modules.length})
                    </button>
                    <button type="button" className="mini-btn danger" style={{padding:"5px 8px", fontSize:10.5}}
                      onClick={()=>onDeletePreset(p.id)}>삭제</button>
                  </div>
                ))}
              </div>
            </Section>
          )}
          <Section
            title="평가 항목 선택"
            sub={`${selected.length} / ${MODULE_DEFS.length}개 선택됨`}
            right={<button className="mini-btn" onClick={toggleAll}>{selected.length===MODULE_DEFS.length?"전체 해제":"전체 선택"}</button>}
          >
            {MODULE_DEFS.map(m=>(
              <div key={m.key}
                className={"bbs-opt"+(selected.includes(m.key)?" on":"")}
                onClick={()=>toggle(m.key)}>
                <div className="bbs-badge">{selected.includes(m.key)?"✓":""}</div>
                <div className="txt">{m.label}</div>
              </div>
            ))}
          </Section>
        </div>
      </div>
      <div className="action-bar">
        <button className="btn cancel" style={{flex:"0 0 64px"}} onClick={onClose}>닫기</button>
        <button className="btn cancel" disabled={selected.length===0} onClick={()=>setShowNameModal(true)}>세트로 저장</button>
        <button className="btn save" disabled={selected.length===0} onClick={()=>onStart(selected)}>시작하기</button>
      </div>
      {showNameModal && (
        <PromptModal
          title="세트 이름"
          placeholder="예: 손기능 기본세트"
          onCancel={()=>setShowNameModal(false)}
          onConfirm={(name)=>{ onSavePreset(name, selected); setShowNameModal(false); }}
        />
      )}
    </div>
  );
}

/* ---------------- 요약 텍스트 (복사용) ---------------- */

const MODULE_SUMMARY = {
  jebsen: d => `- Jebsen-Taylor 항목1(짧은 문장쓰기) Dom/Non-dom: ${d.jebsen[0].dom||"-"} / ${d.jebsen[0].nondom||"-"}초`,
  handpower: d => `- Hand power - Grasp(kg) Rt/Lt: ${d.grip.grasp.rt||"-"} / ${d.grip.grasp.lt||"-"}`,
  mftraw: d => `- MFT 세부항목 응답: ${d.raw.filter(r=>r.rt!==null||r.lt!==null).length}/${MFT_RAW_ITEMS.length}개`,
  oconnor: d => {
    const r1 = oconnorRaw(d.oconnor.rt), r2 = oconnorRaw(d.oconnor.lt);
    return `- O'Connor Raw score Rt/Lt: ${r1===null?"-":r1.toFixed(2)} / ${r2===null?"-":r2.toFixed(2)}`;
  },
  boxblock: d => `- Box&Block Rt/Lt: ${d.boxblock.rt||"-"} / ${d.boxblock.lt||"-"}`,
  edinburgh: d => { const e=edinCalc(d.edin); return `- Edinburgh LQ: ${e.lq===null?"-":e.lq.toFixed(1)} (${e.cat||"-"})`; },
  fingertap: d => `- Finger Tapping 평균 Rt/Lt: ${tapAvg(d.tap.rows,"rt")||"-"} / ${tapAvg(d.tap.rows,"lt")||"-"}`,
  thumbloc: d => `- Thumb Localization Impaired side: ${d.thumbLoc.impairedSide||"-"} / P1,P2,P3: ${[d.thumbLoc.p1,d.thumbLoc.p2,d.thumbLoc.p3].map(v=>v===null||v===undefined?"-":v).join(", ")}`,
  dash: d => `- DASH Disability/Work/Sports: ${d.dash.disability||"-"} / ${d.dash.work||"-"} / ${d.dash.sports||"-"}`,
  sensibility: d => `- Sensibility 입력됨`,
  purdue: d => `- Purdue Pegboard R/L/Both(1st): ${d.purdue.right.t1||"-"} / ${d.purdue.left.t1||"-"} / ${d.purdue.both.t1||"-"}`,
};

function buildSummary(rec){
  const d = rec.data;
  let s = `[맞춤 평가] ${d.date||"날짜 미입력"} ${d.evalType?("("+d.evalType+")"):""}\n`;
  (rec.modules||[]).forEach(key=>{
    if(MODULE_SUMMARY[key]) s += MODULE_SUMMARY[key](d) + "\n";
  });
  if(d.note) s += `- 비고: ${d.note}\n`;
  s += `(최초작성 ${fmtDT(rec.createdAt)} / 최종수정 ${fmtDT(rec.updatedAt)})`;
  return s;
}

function copyText(text, onDone){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>onDone(true)).catch(()=>onDone(false));
  } else {
    try{
      const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); document.body.removeChild(ta); onDone(true);
    }catch(e){ onDone(false); }
  }
}

/* ---------------- 목록 화면 ---------------- */

function ListView({ records, onEdit, onRequestDelete, toast }){
  const sorted = records.slice().sort((a,b)=>b.updatedAt-a.updatedAt);

  if(sorted.length===0){
    return (
      <div className="scroll-area">
        <div className="pad">
          <div className="empty-state">
            <div className="big">📋</div>
            <div style={{fontWeight:700, marginBottom:4}}>저장된 평가 기록이 없습니다</div>
            <div style={{fontSize:12.5}}>오른쪽 아래 "평가 시작하기" 버튼으로 새 평가를 시작하세요</div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="scroll-area">
      <div className="pad">
        {sorted.map(rec=>{
          const modLabels = (rec.modules||[]).map(k=>{
            const def = MODULE_DEFS.find(m=>m.key===k);
            return def ? def.label : k;
          });
          return (
            <div className="card" key={rec.id}>
              <div onClick={()=>onEdit(rec.id)}>
                <div className="rec-top">
                  <div>
                    <div className="rec-date">{rec.data.date || "날짜 미입력"}</div>
                    {rec.data.evalType && <div className="rec-type">{rec.data.evalType}</div>}
                  </div>
                </div>
                <div className="rec-meta">
                  포함 항목({modLabels.length}): {modLabels.slice(0,3).join(", ")}{modLabels.length>3?` 외 ${modLabels.length-3}개`:""}<br/>
                  최초작성 {fmtDT(rec.createdAt)}<br/>
                  최종수정 {fmtDT(rec.updatedAt)}
                </div>
              </div>
              <div className="rec-actions">
                <button className="mini-btn primary" onClick={()=>onEdit(rec.id)}>보기/수정</button>
                <button className="mini-btn" onClick={()=>{
                  copyText(buildSummary(rec), ok=>toast(ok?"결과를 복사했습니다":"복사에 실패했습니다"));
                }}>결과 복사</button>
                <button className="mini-btn danger" onClick={()=>onRequestDelete(rec.id)}>삭제</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------- 플로팅 타이머 ---------------- */

function FloatingTimer(){
  const [open, setOpen] = useState(false);
  const [mode, setMode] = useState("stopwatch"); // stopwatch | 30 | 60
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0); // ms, counts up for stopwatch, counts down for presets
  const [laps, setLaps] = useState([]);
  const intervalRef = useRef(null);
  const startBaseRef = useRef(0);
  const startTsRef = useRef(0);

  const beep = playBeep;

  const totalMs = mode==="30" ? 30000 : mode==="60" ? 60000 : null;

  useEffect(()=>{
    if(running){
      startTsRef.current = Date.now();
      intervalRef.current = setInterval(()=>{
        const now = Date.now();
        let val = startBaseRef.current + (now - startTsRef.current);
        if(totalMs!==null){
          const remain = totalMs - val;
          if(remain<=0){
            setElapsed(0);
            setRunning(false);
            beep();
            clearInterval(intervalRef.current);
            return;
          }
          setElapsed(remain);
        } else {
          setElapsed(val);
        }
      }, 100);
    } else {
      clearInterval(intervalRef.current);
    }
    return ()=>clearInterval(intervalRef.current);
  }, [running, mode]);

  const fmt = (ms)=>{
    const s = Math.max(0, ms/1000);
    const mm = Math.floor(s/60);
    const ss = (s%60).toFixed(1);
    return (mm<10?"0"+mm:mm)+":"+(parseFloat(ss)<10?"0"+ss:ss);
  };

  const start = ()=>{
    startBaseRef.current = mode==="stopwatch" ? elapsed : (totalMs - elapsed);
    setRunning(true);
  };
  const stop = ()=>setRunning(false);
  const reset = ()=>{
    setRunning(false);
    setElapsed(mode==="stopwatch" ? 0 : (totalMs||0));
    setLaps([]);
  };
  const lap = ()=>{
    setLaps(prev=>[{n:prev.length+1, t: mode==="stopwatch"?elapsed:(totalMs-elapsed)}, ...prev]);
  };
  const switchMode = (m)=>{
    setRunning(false);
    setMode(m);
    setElapsed(m==="stopwatch" ? 0 : (m==="30"?30000:60000));
    setLaps([]);
  };

  return (
    <React.Fragment>
      {open && (
        <div className="timer-panel">
          <div className="timer-modes">
            <button className={"timer-mode-btn"+(mode==="stopwatch"?" on":"")} onClick={()=>switchMode("stopwatch")}>스톱워치</button>
            <button className={"timer-mode-btn"+(mode==="30"?" on":"")} onClick={()=>switchMode("30")}>30초</button>
            <button className={"timer-mode-btn"+(mode==="60"?" on":"")} onClick={()=>switchMode("60")}>60초</button>
          </div>
          <div className="timer-time">{fmt(elapsed)}</div>
          <div className="timer-controls">
            {!running
              ? <button className="tc-start" onClick={start}>시작</button>
              : <button className="tc-stop" onClick={stop}>정지</button>}
            <button className="tc-lap" onClick={lap}>기록</button>
            <button className="tc-reset" onClick={reset}>초기화</button>
          </div>
          {laps.length>0 && (
            <div className="lap-list">
              {laps.map(l=>(
                <div className="lap-item" key={l.n}><span>#{l.n}</span><span>{fmt(l.t)}</span></div>
              ))}
            </div>
          )}
        </div>
      )}
      <div className="timer-fab">
        <button className="timer-btn" onClick={()=>setOpen(o=>!o)}>⏱</button>
      </div>
    </React.Fragment>
  );
}

/* ---------------- 최상위 App ---------------- */

function App(){
  const [db, setDb] = useState(loadDB);
  const [screen, setScreen] = useState("list"); // list | form
  const [editingId, setEditingId] = useState(null);
  const [currentModules, setCurrentModules] = useState([]);
  const [toastMsg, setToastMsg] = useState("");
  const [confirmState, setConfirmState] = useState(null); // { message, onConfirm }
  const [pickerOpen, setPickerOpen] = useState(false);
  const [pickerMode, setPickerMode] = useState("new"); // new | adjust
  const [pickerInitial, setPickerInitial] = useState([]);

  useEffect(()=>{ saveDB(db); }, [db]);

  const toast = (msg)=>{
    setToastMsg(msg);
    setTimeout(()=>setToastMsg(""), 1800);
  };

  const records = db.custom;

  const openPickerForNew = ()=>{ setPickerInitial([]); setPickerMode("new"); setPickerOpen(true); };
  const openPickerForAdjust = ()=>{ setPickerInitial(currentModules); setPickerMode("adjust"); setPickerOpen(true); };

  const handlePickerStart = (selected)=>{
    if(pickerMode==="new"){
      setCurrentModules(selected);
      setEditingId(null);
      setScreen("form");
    } else {
      setCurrentModules(selected);
    }
    setPickerOpen(false);
  };

  const handleSavePreset = (name, modules)=>{
    const preset = { id: uid(), name, modules, createdAt: Date.now() };
    setDb(prev=>({...prev, presets:[...prev.presets, preset]}));
    toast("세트가 저장되었습니다");
  };
  const handleDeletePreset = (id)=>{
    setDb(prev=>({...prev, presets: prev.presets.filter(p=>p.id!==id)}));
  };

  const openEdit = (id)=>{
    const rec = records.find(r=>r.id===id);
    if(!rec) return;
    setEditingId(id);
    setCurrentModules(rec.modules||[]);
    setScreen("form");
  };
  const cancelForm = ()=>{ setScreen("list"); setEditingId(null); };

  const doDelete = (id)=>{
    setDb(prev=>({...prev, custom: prev.custom.filter(r=>r.id!==id)}));
    toast("삭제되었습니다");
  };

  const requestDeleteFromList = (id)=>{
    setConfirmState({
      message: "이 기록을 삭제하시겠습니까? 삭제하면 되돌릴 수 없습니다.",
      onConfirm: ()=>{ doDelete(id); setConfirmState(null); }
    });
  };
  const requestDeleteFromForm = ()=>{
    setConfirmState({
      message: "이 기록을 삭제하시겠습니까? 삭제하면 되돌릴 수 없습니다.",
      onConfirm: ()=>{ doDelete(editingId); setConfirmState(null); setScreen("list"); setEditingId(null); }
    });
  };

  const onSave = (data)=>{
    setDb(prev=>{
      const now = Date.now();
      if(editingId){
        const updated = prev.custom.map(r=> r.id===editingId ? {...r, data, modules: currentModules, updatedAt: now} : r);
        return {...prev, custom: updated};
      } else {
        const rec = { id: uid(), createdAt: now, updatedAt: now, modules: currentModules, data };
        return {...prev, custom: [rec, ...prev.custom]};
      }
    });
    toast("저장되었습니다");
    setScreen("list"); setEditingId(null);
  };

  const editingRecord = editingId ? records.find(r=>r.id===editingId) : null;
  const formInitial = editingRecord ? deepMerge(emptyShared(), editingRecord.data) : emptyShared();

  return (
    <React.Fragment>
      <div className="topbar">
        <div className="brand"><div className="logo">✋</div>작업치료 평가 도구</div>
        {screen==="form" && <button className="icon-btn" onClick={cancelForm}>✕</button>}
      </div>

      {screen==="list" ? (
        <React.Fragment>
          <ListView records={records} onEdit={openEdit} onRequestDelete={requestDeleteFromList} toast={toast} />
          <button className="fab" onClick={openPickerForNew}>＋ 평가 시작하기</button>
        </React.Fragment>
      ) : (
        <FormCustom
          key={editingId || "new"}
          initial={formInitial}
          modules={currentModules}
          onSave={onSave}
          onCancel={cancelForm}
          isEdit={!!editingId}
          onRequestDelete={requestDeleteFromForm}
          onEditModules={openPickerForAdjust}
        />
      )}

      <FloatingTimer />

      {toastMsg && <div className="toast">{toastMsg}</div>}

      {confirmState && (
        <ConfirmModal
          title="기록 삭제"
          message={confirmState.message}
          confirmText="삭제"
          cancelText="취소"
          onCancel={()=>setConfirmState(null)}
          onConfirm={confirmState.onConfirm}
        />
      )}

      {pickerOpen && (
        <ModulePickerModal
          initialModules={pickerInitial}
          presets={db.presets}
          onStart={handlePickerStart}
          onSavePreset={handleSavePreset}
          onDeletePreset={handleDeletePreset}
          onClose={()=>setPickerOpen(false)}
        />
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
